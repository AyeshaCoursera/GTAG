# Transcriptomic Analysis Framework Configuration

# Data settings
data:
  gtex_s3_path: "s3://openproblems-data/resources/datasets/cellxgene_census/gtex_v9/log_cp10k/dataset.h5ad"
  tcga_path: "TCGA-STAD.star_counts.tsv"
  n_cells_sample: 10000
  n_hvg_genes: 500
  random_seed: 42

# Analysis parameters
analysis:
  correlation_threshold: 0.65
  fdr_alpha: 0.05
  top_genes_per_tissue: 15
  n_coexpression_genes: 100

# ML settings
ml:
  tabtransformer:
    d_model: 64
    nhead: 4
    num_layers: 3
    dim_feedforward: 128
    dropout: 0.1
    batch_size: 16
    num_epochs: 100
    learning_rate: 0.001
    
  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.05
    
  lasso:
    max_iter: 1000
    cv_folds: 5

# VAE settings
vae:
  latent_dim: 64
  hidden_dims: [256, 128]
  beta: 0.5
  num_epochs: 50
  batch_size: 128

# Output settings
output:
  dir: "outputs"
  save_models: true
  save_plots: true
